name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "book.toml"
      - "docs/book/**"
      - "docs/dogfood/**"
      - "docs/PRINCIPLES.md"
      - "docs/DOGFOOD.md"
      - "docs/ARCH-LAYERS.md"
      - "eval/notes/**"
      - "CHANGELOG.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook (prebuilt binary, no cargo build)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify mdBook
        run: mdbook --version

      - name: Build book into docs/ subpath
        run: mdbook build

      - name: Assemble site
        run: |
          # Landing page is root; mdBook docs live under /docs
          cp site/index.html book-out/index.html
          # mdBook already built into book-out/ — its own index.html
          # becomes book-out/docs/index.html
          mkdir -p book-out/docs
          # Move mdBook output into docs/ subdir
          # mdBook outputs to book-out/ directly; we need to restructure
          # so the landing page is root and book content is under /docs
          # Strategy: build mdBook into a temp dir, then assemble
          rm -rf _book_tmp
          mv book-out _book_tmp
          mkdir -p book-out/docs
          cp -r _book_tmp/* book-out/docs/
          cp site/index.html book-out/index.html
          rm -rf _book_tmp

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
