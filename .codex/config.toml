# abyss-managed: do not edit
[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = "abyss hook pre-edit"
timeout = 10

[[hooks.PreToolUse]]
matcher = "Bash|shell"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "abyss hook pre-edit"
timeout = 5

[[hooks.PostToolUse]]
matcher = "Bash|shell"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "abyss hook post-edit"
timeout = 5

